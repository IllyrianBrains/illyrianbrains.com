docs_dir: !ENV [BUILD_DOCS_DIR, "docs"]
site_url: !ENV [BUILD_SITE_URL, "https://forum.illyrianbrains.dev"]
site_dir: !ENV [BUILD_SITE_DIR, "site/en"]

site_name: Illyrian Brains Network
site_description:
  !ENV [
    SITE_DESCRIPTION,
    "Illyrian Brains, rrjeti juaj i profesionistëve shqipfolës.",
  ]
edit_uri_template:
  !ENV [BUILD_EDIT_URI_TEMPLATE, "blob/main/docs/{path}?plain=1"]

extra:
  generator: false
  context: !ENV [BUILD_CONTEXT, "production"]
  offline: !ENV [BUILD_OFFLINE, false]
  deploy: !ENV DEPLOY_ID
  privacy_guides:
    footer:
      intro:
        !ENV [
          FOOTER_INTRO,
          "Illyrian Brains është një bashkëpunim shoqëror midis profesionistëve që ndajnë origjinë nga Shqipëria, Kosova, Maqedonia e Veriut, trevat dhe diaspora.",
        ]
      note:
        !ENV [
          FOOTER_NOTE,
          "Ne nuk kemi përfitime monetare nga rrjeti dhe nuk kemi ndërmend që ta bëjmë këtë gjë në të ardhmen.",
        ]
      copyright:
        author:
          !ENV [FOOTER_COPYRIGHT_AUTHOR, "Kontribuesit e IllyrianBrains."]
        date: !ENV [FOOTER_COPYRIGHT_DATE, "2020-2025"]
      license:
        - fontawesome/brands/creative-commons
        - fontawesome/brands/creative-commons-by
        - fontawesome/brands/creative-commons-sa
    homepage:
      description:
        !ENV [
          HOMEPAGE_DESCRIPTION, "Rrjeti i profesionistëve shqipfolës në diasporë.",
          ".",
        ]
      hero:
        header:
          !ENV [HOMEPAGE_HEADER, "Rrjeti i profesionistëve shqipfolës në diasporë."]
        subheader:
          !ENV [
            HOMEPAGE_SUBHEADER,
            "Krijo ura komunikimi me profesionistë shqiptarë në mbarë mbotën. Bëhu pjesë e komunitetit dhe krijo bashkëpunime profesionale, kulturore dhe shoqërore me anëtarët e grupit.",
          ]
        buttons:
          - name: "Nis udhëtimin me IB"
            title: "Nis udhëtimin me IB!"
            link: "happyhours/"
            class: md-button md-button--primary
          - name: "Mëso mbi nismat tona!"
            title: "Kontributi ynë për diasporën!"
            link: "nismat/"
            class: md-button
  social:
    - icon: simple/discourse
      link: https://discuss.privacyguides.net/
      name: !ENV [SOCIAL_FORUM, "Forumi"]
    - icon: simple/github
      link: https://github.com/privacyguides
      name: !ENV [SOCIAL_GITHUB, "GitHub"]
    - icon: simple/torbrowser
      link: http://www.xoe4vn5uwdztif6goazfbmogh6wh5jc4up35bqdflu6bkdc5cas5vjqd.onion/
      name: !ENV [SOCIAL_TOR_SITE, "Hidden service"]

theme:
  name: material
  logo: assets/logo_big.png
  language: "en"
  custom_dir: theme
  font:
    text: "Public Sans"
    code: "DM Mono"
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      accent: red
      toggle:
        icon: material/brightness-auto
        name:  "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: default
      accent: red
      toggle:
        icon: material/brightness-2
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      accent: red
      scheme: slate
      toggle:
        icon: material/brightness-5
        name: "Switch to system theme"

  favicon: assets/logo_small.png
  
  icon:
    repo: simple/github
  features:
    - announce.dismiss
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - content.action.edit
    - content.tabs.link
    - content.tooltips
    - search.highlight

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - path: assets/javascripts/randomize-element.js
    defer: true
  - path: assets/javascripts/feedback.js
    defer: true

watch:
  - theme
  - includes

plugins:
  tags: {}
  search: {}
  privacy:
    enabled: !ENV [BUILD_PRIVACY, true]
  offline:
    enabled: !ENV [BUILD_OFFLINE, false]
  group:
    enabled: !ENV [BUILD_INSIDERS, false]
    plugins:
      macros: {}
      meta: {}
      git-authors:
        enabled: !ENV [GITAUTHORS, PRODUCTION, NETLIFY, false]
        sort_authors_by: contribution
        show_contribution: true
        fallback_to_empty: true
        authorship_threshold_percent: 1
      git-revision-date-localized:
        enabled: !ENV [GITREVISIONDATE, PRODUCTION, NETLIFY, false]
        exclude:
          - index.md
        fallback_to_build_date: true
        enable_creation_date: true
      optimize:
        enabled: !ENV [OPTIMIZE, PRODUCTION, NETLIFY, false]
      typeset: {}
      social:
        cards: !ENV [CARDS, true]
        cards_dir: assets/img/social
        cards_layout_dir: theme/layouts
        cards_layout: page
        # cards_layout: pride

markdown_extensions:
  admonition: {}
  pymdownx.details: {}
  pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format
  pymdownx.tabbed:
    alternate_style: true
  pymdownx.arithmatex:
    generic: true
  pymdownx.critic: {}
  pymdownx.caret: {}
  pymdownx.keys: {}
  pymdownx.mark: {}
  pymdownx.tilde: {}
  pymdownx.snippets:
    auto_append:
      - !ENV [BUILD_ABBREVIATIONS, "includes/abbreviations.en.txt"]
  pymdownx.tasklist:
    custom_checkbox: true
  attr_list: {}
  def_list: {}
  md_in_html: {}
  meta: {}
  abbr: {}
  pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
  tables: {}
  footnotes: {}
  toc:
    toc_depth: 4

nav:
  - "Happy Hours":
      - "happyhours/happyhours.md"
  - "Nismat":
      - "nismat/nismat.md"
  - "Forumi":
      - "https://forum.illyrianbrains.dev/"
  - "Rreth Nesh":
      - "rrethnesh/about.md"
      - "about/contributors.md"
      - "about/criteria.md"
      - "about/executive-policy.md"
      - "about/notices.md"
      - "about/privacy-policy.md"

validation:
  nav:
    not_found: info
    omitted_files: ignore
    absolute_links: ignore
